# 成都小学数学教师招聘信息追踪项目
#
# 数据源配置、爬虫相关配置

# 数据源列表
[sources]
# 成都市人力资源和社会保障局 - 事业单位公开招聘
cdhrss = "https://cdhrss.chengdu.gov.cn/"
# 成都人事考试网
cdpta = "https://cdpta.cdhrss.chengdu.gov.cn/netpage/"
# 成都人才网 - 搜索教师岗
rc114 = "https://www.rc114.com/"
# 四川省人力资源和社会保障厅
scrs = "https://rst.sc.gov.cn/"
# 成都市教育局
cdedu = "http://edu.chengdu.gov.cn/"
# 四川人事考试网
scpta = "http://www.scpta.gov.cn/"
# 智联招聘 - 成都教师岗
zhilian = "https://www.zhaopin.com/"
# 前程无忧 - 成都教师岗
qiancheng = "https://www.51job.com/"
# 高校人才网
gaoxiaojob = "https://www.gaoxiaojob.com/"

[crawl]
# 更新间隔（小时），默认48小时=2天
interval_hours = 48
# 每个源的请求超时（秒）
timeout = 30
# 请求间隔（秒），避免被封
request_delay = 3

[search]
# 搜索关键词
keywords = [
    "小学数学教师",
    "小学数学老师",
    "小学数学招聘",
    "成都小学数学",
    "小学教师招聘"
]

[regions]
# 成都市所有区县
regions = [
    "锦江区", "青羊区", "金牛区", "武侯区", "成华区",
    "高新区", "天府新区",
    "龙泉驿区", "青白江区", "新都区", "温江区",
    "双流区", "郫都区", "新津区",
    "简阳市", "都江堰市", "彭州市", "邛崃市", "崇州市",
    "金堂县", "大邑县", "蒲江县"
]

[output]
html_dir = "docs"
data_dir = "data"
log_dir = "logs"
